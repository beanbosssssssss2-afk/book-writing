<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Writer Offline</title>
    <link rel="manifest" href="manifest.json">
    <!-- Load Quill Styles -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { background: #121212; color: #e0e0e0; margin: 0; font-family: sans-serif; }
        #toolbar-container { background: #222; border-bottom: 1px solid #444; position: sticky; top: 0; z-index: 100; }
        #editor { height: calc(100vh - 80px); background: #1e1e1e; color: #fff; font-size: 18px; border: none !important; }
        .ql-snow .ql-stroke { stroke: #bbb !important; }
        .ql-snow .ql-fill { fill: #bbb !important; }
        .ql-snow .ql-picker { color: #bbb !important; }
        #status-bar { position: fixed; bottom: 0; width: 100%; background: #333; font-size: 12px; padding: 5px 20px; color: #888; display: flex; justify-content: space-between; }
        button.download-btn { background: #4caf50; border: none; color: white; padding: 5px 10px; cursor: pointer; border-radius: 3px; margin-right: 40px;}
    </style>
</head>
<body>

<div id="toolbar-container">
    <!-- This is where all your Google Doc options live -->
    <div id="toolbar">
        <select class="ql-header"></select>
        <select class="ql-font"></select>
        <button class="ql-bold"></button>
        <button class="ql-italic"></button>
        <button class="ql-underline"></button>
        <select class="ql-color"></select>
        <select class="ql-background"></select>
        <button class="ql-list" value="ordered"></button>
        <button class="ql-list" value="bullet"></button>
        <button class="ql-clean"></button>
        <button onclick="downloadFile()" class="download-btn">Download .txt</button>
    </div>
</div>

<div id="editor"></div>

<div id="status-bar">
    <span id="save-status">Ready</span>
    <span id="word-count">Words: 0</span>
</div>

<!-- Load Quill Library -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    // Initialize Quill
    var quill = new Quill('#editor', {
        modules: { toolbar: '#toolbar' },
        theme: 'snow',
        placeholder: 'Write your story...'
    });

    // Auto-Save Logic (LocalStorage)
    const SAVED_DATA = localStorage.getItem('manuscript');
    if (SAVED_DATA) {
        quill.setContents(JSON.parse(SAVED_DATA));
    }

    quill.on('text-change', function() {
        const data = JSON.stringify(quill.getContents());
        localStorage.setItem('manuscript', data);
        document.getElementById('save-status').innerText = "Autosaved at " + new Date().toLocaleTimeString();
        updateWordCount();
    });

    function updateWordCount() {
        const text = quill.getText();
        const count = text.trim().split(/\s+/).length;
        document.getElementById('word-count').innerText = "Words: " + (text.length > 1 ? count : 0);
    }

    function downloadFile() {
        const text = quill.getText();
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = 'my-book-draft.txt';
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
    }

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
